<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LTracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">LTracker</p>
          <h1>Hoje</h1>
          <p class="current-date" id="current-date"></p>
          <p class="storage-note">Dados salvos apenas neste dispositivo.</p>
        </div>
        <p class="date-label">Painel pessoal</p>
      </header>

      <section class="today-grid" aria-label="Resumo de hoje">
        <article class="card">
          <div class="card-header">
            <p class="card-kicker">Diario</p>
            <h2>Registro diario</h2>
          </div>
          <form class="daily-form" id="daily-form">
            <div class="form-grid">
              <label>
                Status do dia
                <select id="dayStatus" name="dayStatus">
                  <option value="active">Ativo</option>
                  <option value="planned_rest">Descanso planejado</option>
                  <option value="recovery">Recuperacao</option>
                  <option value="sick">Doente</option>
                </select>
              </label>

              <label>
                Nota do status
                <input id="statusNote" name="statusNote" type="text" placeholder="Ex: perna cansada" />
              </label>

              <label>
                Peso
                <input id="weight" name="weight" type="number" step="0.1" inputmode="decimal" placeholder="kg" />
              </label>

              <label>
                Horas de sono
                <input id="sleepHours" name="sleepHours" type="number" step="0.5" inputmode="decimal" placeholder="h" />
              </label>

              <label>
                Qualidade do sono
                <select id="sleepQuality" name="sleepQuality">
                  <option value="">1-5</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
              </label>

              <label>
                Disposicao
                <select id="mood" name="mood">
                  <option value="">1-5</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
              </label>
            </div>

            <label>
              Dores/desconfortos
              <input id="soreness" name="soreness" type="text" placeholder="Ex: lombar leve, pernas ok" />
            </label>

            <label>
              Observacoes rapidas
              <textarea id="notes" name="notes" rows="3" placeholder="Algo importante sobre hoje"></textarea>
            </label>

            <button type="submit">Salvar Dia</button>
          </form>
        </article>

        <article class="card">
          <div class="card-header">
            <p class="card-kicker">Treino</p>
            <h2>Atividades</h2>
          </div>
          <form class="activity-form" id="activity-form">
            <div class="form-grid">
              <label>
                Tipo
                <select id="activityType" name="activityType">
                  <option value="Corrida">Corrida</option>
                  <option value="Bike">Bike</option>
                  <option value="Academia">Academia</option>
                </select>
              </label>

              <label>
                Duracao
                <input id="activityDuration" name="activityDuration" type="number" min="0" step="5" inputmode="numeric" placeholder="min" />
              </label>

              <label>
                Intensidade
                <select id="activityIntensity" name="activityIntensity">
                  <option value="">1-5</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                  <option value="5">5</option>
                </select>
              </label>

              <label class="distance-field">
                Distancia
                <input id="activityDistance" name="activityDistance" type="number" min="0" step="0.1" inputmode="decimal" placeholder="km" />
              </label>

              <label class="gym-field">
                Treino
                <select id="workoutPlan" name="workoutPlan">
                  <option value="">A/B</option>
                  <option value="A">A</option>
                  <option value="B">B</option>
                </select>
              </label>

              <label class="gym-field">
                Sensacao
                <input id="workoutFeeling" name="workoutFeeling" type="text" placeholder="Ex: forte, leve" />
              </label>
            </div>

            <label>
              Observacoes
              <textarea id="activityNotes" name="activityNotes" rows="3" placeholder="Detalhe rapido da atividade"></textarea>
            </label>

            <button type="submit">Adicionar atividade</button>
          </form>

          <div class="activity-list" id="activity-list" aria-live="polite"></div>
        </article>

        <article class="card card-wide">
          <div class="card-header">
            <p class="card-kicker">Tendencia</p>
            <h2>Resumo semanal</h2>
          </div>
          <div class="weekly-summary" id="weekly-summary">
            <div class="metric">
              <span class="metric-label">Corridas</span>
              <strong id="weekly-runs">0</strong>
            </div>

            <div class="metric">
              <span class="metric-label">Academia</span>
              <strong id="weekly-gym">0</strong>
            </div>

            <div class="metric">
              <span class="metric-label">Dias ativos</span>
              <strong id="weekly-active-days">0</strong>
            </div>

            <div class="metric">
              <span class="metric-label">Descanso/recuperacao/doente</span>
              <strong id="weekly-rest-days">0</strong>
            </div>

            <div class="metric">
              <span class="metric-label">Km corrida</span>
              <strong id="weekly-run-km">0</strong>
            </div>

            <div class="metric">
              <span class="metric-label">Km bike</span>
              <strong id="weekly-bike-km">0</strong>
            </div>

            <div class="metric">
              <span class="metric-label">Media sono</span>
              <strong id="weekly-sleep">&mdash;</strong>
            </div>

            <div class="metric">
              <span class="metric-label">Peso medio</span>
              <strong id="weekly-weight">&mdash;</strong>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
